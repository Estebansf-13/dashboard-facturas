<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Subir Factura · Carmen Fortes Pardo</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Inter", sans-serif;
    background: #0f1419; color: #e6edf3;
    min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px;
  }
  .card {
    background: #1a2028; border: 1px solid #2a3441; border-radius: 16px;
    padding: 40px; max-width: 480px; width: 100%; text-align: center;
  }
  h1 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
  .empresa { color: #6ea8fe; font-size: 14px; font-weight: 600; margin-bottom: 6px; }
  .sub { color: #8b96a5; font-size: 14px; margin-bottom: 32px; }
  .zona-drop {
    border: 2px dashed #2a3441; border-radius: 12px; padding: 48px 24px;
    cursor: pointer; transition: all 0.2s; margin-bottom: 20px;
  }
  .zona-drop:hover, .zona-drop.drag { border-color: #6ea8fe; background: rgba(110,168,254,0.05); }
  .zona-drop .icono { font-size: 40px; margin-bottom: 12px; }
  .zona-drop p { color: #8b96a5; font-size: 14px; }
  .zona-drop p strong { color: #6ea8fe; }
  input[type="file"] { display: none; }
  .archivo-sel {
    background: rgba(63,185,80,0.1); border: 1px solid rgba(63,185,80,0.3);
    border-radius: 8px; padding: 12px 16px; font-size: 14px; color: #3fb950;
    margin-bottom: 20px; display: none;
  }
  button {
    background: #6ea8fe; color: #0f1419; border: none; border-radius: 8px;
    padding: 14px 32px; font-size: 16px; font-weight: 600; cursor: pointer;
    width: 100%; transition: opacity 0.2s; margin-bottom: 8px;
  }
  button:hover { opacity: 0.9; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  .estado {
    margin-top: 20px; padding: 12px 16px; border-radius: 8px; font-size: 14px; display: none;
  }
  .estado.ok { background: rgba(63,185,80,0.1); border: 1px solid rgba(63,185,80,0.3); color: #3fb950; }
  .estado.error { background: rgba(248,81,73,0.1); border: 1px solid rgba(248,81,73,0.3); color: #f85149; }
  .estado.cargando { background: rgba(110,168,254,0.1); border: 1px solid rgba(110,168,254,0.3); color: #6ea8fe; }
  .link-dashboard { margin-top: 24px; font-size: 13px; color: #5a6573; }
  .link-dashboard a { color: #6ea8fe; text-decoration: none; }
  .config-toggle { font-size: 12px; color: #5a6573; cursor: pointer; margin-top: 16px; }
  .config-toggle:hover { color: #8b96a5; }
  .config-panel {
    background: #0f1419; border: 1px solid #2a3441; border-radius: 8px;
    padding: 16px; margin-top: 12px; display: none; text-align: left;
  }
  .config-panel label { font-size: 12px; color: #8b96a5; display: block; margin-bottom: 6px; }
  .config-panel input {
    width: 100%; background: #1a2028; border: 1px solid #2a3441; border-radius: 6px;
    padding: 8px 10px; color: #e6edf3; font-size: 13px; font-family: monospace; margin-bottom: 10px;
  }
  .btn-sec {
    background: #2a3441; color: #e6edf3; font-size: 13px; padding: 8px 16px; width: auto;
  }
  .sin-config {
    background: rgba(210,153,34,0.1); border: 1px solid rgba(210,153,34,0.3);
    border-radius: 8px; padding: 16px; margin-bottom: 20px; font-size: 13px; color: #d29922;
  }
</style>
</head>
<body>
<div class="card">
  <h1>Subir Factura</h1>
  <div class="empresa">Carmen Fortes Pardo</div>
  <p class="sub">Sube tu factura en PDF y el dashboard se actualiza solo</p>

  <div class="sin-config" id="avisoConfig" style="display:none">
    Primera vez: configura el acceso abajo para poder subir facturas.
  </div>

  <div class="zona-drop" id="zona" onclick="document.getElementById('filePicker').click()">
    <div class="icono">📂</div>
    <p>Haz clic aquí o arrastra el PDF</p>
    <p><strong>Solo archivos PDF</strong></p>
  </div>
  <input type="file" id="filePicker" accept=".pdf,.PDF">
  <div class="archivo-sel" id="archivoSel"></div>

  <button id="btn" disabled onclick="subir()">Subir factura</button>

  <div class="estado" id="estado"></div>

  <div class="link-dashboard">
    <a href="dashboard-facturacion.html" target="_blank">Ver dashboard →</a>
  </div>

  <div class="config-toggle" onclick="toggleConfig()">Configuración</div>
  <div class="config-panel" id="configPanel">
    <label>Token de acceso GitHub</label>
    <input type="password" id="inputToken" placeholder="ghp_... o gho_...">
    <label>Repositorio (usuario/repo)</label>
    <input type="text" id="inputRepo" placeholder="Estebansf-13/dashboard-facturas">
    <button class="btn-sec" onclick="guardarConfig()">Guardar</button>
  </div>
</div>

<script>
const STORAGE_TOKEN = 'gf_token_empresa2';
const STORAGE_REPO  = 'gf_repo_empresa2';

let archivoActual = null;

function getToken() { return localStorage.getItem(STORAGE_TOKEN) || ''; }
function getRepo()  { return localStorage.getItem(STORAGE_REPO)  || 'Estebansf-13/dashboard-facturas'; }

function init() {
  document.getElementById('inputRepo').value = getRepo();
  if (!getToken()) {
    document.getElementById('avisoConfig').style.display = 'block';
    document.getElementById('configPanel').style.display = 'block';
  }
}

function toggleConfig() {
  const p = document.getElementById('configPanel');
  p.style.display = p.style.display === 'none' ? 'block' : 'none';
}

function guardarConfig() {
  const t = document.getElementById('inputToken').value.trim();
  const r = document.getElementById('inputRepo').value.trim();
  if (t) localStorage.setItem(STORAGE_TOKEN, t);
  if (r) localStorage.setItem(STORAGE_REPO, r);
  document.getElementById('avisoConfig').style.display = 'none';
  document.getElementById('configPanel').style.display = 'none';
  mostrarEstado('Configuración guardada', 'ok');
}

const zona = document.getElementById('zona');
const picker = document.getElementById('filePicker');
const btn = document.getElementById('btn');
const selDiv = document.getElementById('archivoSel');
const estadoDiv = document.getElementById('estado');

picker.addEventListener('change', e => seleccionarArchivo(e.target.files[0]));
zona.addEventListener('dragover', e => { e.preventDefault(); zona.classList.add('drag'); });
zona.addEventListener('dragleave', () => zona.classList.remove('drag'));
zona.addEventListener('drop', e => {
  e.preventDefault(); zona.classList.remove('drag');
  const f = e.dataTransfer.files[0];
  if (f && f.name.toLowerCase().endsWith('.pdf')) seleccionarArchivo(f);
  else mostrarEstado('Solo se admiten archivos PDF', 'error');
});

function seleccionarArchivo(f) {
  if (!f) return;
  archivoActual = f;
  selDiv.textContent = '✓ ' + f.name;
  selDiv.style.display = 'block';
  btn.disabled = false;
  estadoDiv.style.display = 'none';
}

async function subir() {
  if (!archivoActual) return;
  const token = getToken();
  if (!token) { mostrarEstado('Primero configura el token de acceso abajo', 'error'); return; }

  btn.disabled = true;
  mostrarEstado('Subiendo factura...', 'cargando');

  try {
    const base64 = await toBase64(archivoActual);
    const path = `empresa-2-carmen-fortes/facturas/nuevas/${archivoActual.name}`;
    const url = `https://api.github.com/repos/${getRepo()}/contents/${path}`;

    let sha = null;
    try {
      const check = await fetch(url, { headers: { Authorization: `token ${token}` } });
      if (check.ok) { const d = await check.json(); sha = d.sha; }
    } catch (e) {}

    const body = { message: `Carmen Fortes: nueva factura ${archivoActual.name}`, content: base64 };
    if (sha) body.sha = sha;

    const res = await fetch(url, {
      method: 'PUT',
      headers: { Authorization: `token ${token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });

    if (res.ok) {
      mostrarEstado('✓ Factura subida. El dashboard se actualiza en 1-2 minutos.', 'ok');
      archivoActual = null;
      selDiv.style.display = 'none';
      btn.disabled = true;
    } else {
      const err = await res.json();
      mostrarEstado('Error: ' + (err.message || 'No se pudo subir'), 'error');
      btn.disabled = false;
    }
  } catch (e) {
    mostrarEstado('Error de conexión. Comprueba tu internet.', 'error');
    btn.disabled = false;
  }
}

function toBase64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(',')[1]);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

function mostrarEstado(msg, tipo) {
  estadoDiv.textContent = msg;
  estadoDiv.className = 'estado ' + tipo;
  estadoDiv.style.display = 'block';
}

init();
</script>
</body>
</html>
