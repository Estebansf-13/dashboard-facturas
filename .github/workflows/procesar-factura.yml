name: Procesar factura nueva — Empresa 1

on:
  push:
    paths:
      - 'empresa-original-prueba-1/facturas/nuevas/**'

permissions:
  contents: write

jobs:
  procesar:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Procesar facturas
        run: python empresa-original-prueba-1/procesar.py

      - name: Guardar cambios en GitHub
        run: |
          git config user.name "Dashboard Bot"
          git config user.email "bot@dashboard-facturas.com"
          git add empresa-original-prueba-1/facturas_datos.json
          git rm --cached "empresa-original-prueba-1/facturas/nuevas/"*.pdf "empresa-original-prueba-1/facturas/nuevas/"*.PDF 2>/dev/null || true
          git diff --cached --quiet || git commit -m "Empresa 1: factura procesada automáticamente"
          git pull --rebase origin main
          git push
