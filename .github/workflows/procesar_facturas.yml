name: Procesar Facturas — Empresa 1

on:
  push:
    paths:
      - 'empresa-original-prueba-1/facturas/nuevas/**'

jobs:
  procesar:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar Tesseract OCR y poppler
        run: sudo apt-get install -y tesseract-ocr tesseract-ocr-spa poppler-utils libheif-dev

      - name: Instalar dependencias Python
        run: pip install pdfplumber pdf2image pillow pillow-heif pytesseract google-generativeai

      - name: Procesar facturas nuevas
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python empresa-original-prueba-1/procesar_gha.py

      - name: Validar JSON antes de subir
        run: python -c "import json; json.load(open('empresa-original-prueba-1/facturas_datos.json')); print('JSON válido ✓')"

      - name: Subir cambios al repositorio
        run: |
          git config user.name "Dashboard Bot"
          git config user.email "bot@dashboard-facturas"
          git add empresa-original-prueba-1/facturas_datos.json empresa-original-prueba-1/facturas/
          git diff --staged --quiet || git commit -m "Empresa 1: factura procesada automaticamente [skip ci]"
          git pull --rebase origin main
          git push