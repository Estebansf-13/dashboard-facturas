name: Procesar Facturas — Empresa 1 (pdfplumber)

on:
  push:
    paths:
      - 'empresa-original-prueba-1/facturas/nuevas/**.pdf'
      - 'empresa-original-prueba-1/facturas/nuevas/**.PDF'

jobs:
  procesar:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install pdfplumber

      - name: Procesar facturas nuevas
        run: python empresa-original-prueba-1/procesar_gha.py

      - name: Subir cambios al repositorio
        run: |
          git config user.name "Dashboard Bot"
          git config user.email "bot@dashboard-facturas"
          git add empresa-original-prueba-1/facturas_datos.json empresa-original-prueba-1/facturas/
          git diff --staged --quiet || git commit -m "Empresa 1: factura procesada automaticamente [skip ci]"
          git pull --rebase origin main
          git push
