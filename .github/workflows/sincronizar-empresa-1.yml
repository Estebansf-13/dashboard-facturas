name: Sincronizar Dashboard — Empresa 1

on:
  push:
    paths:
      - 'empresa-original-prueba-1/facturas/ingresos/**'
      - 'empresa-original-prueba-1/facturas/gastos/**'
      - 'empresa-original-prueba-1/facturas/archivadas/**'

jobs:
  sincronizar:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Eliminar del JSON las facturas cuyos archivos ya no existen
        run: |
          python3 - <<'EOF'
          import json, os, time
          from pathlib import Path

          BASE_DIR = Path("empresa-original-prueba-1")
          JSON_PATH = BASE_DIR / "facturas_datos.json"

          # Archivos PDF que existen actualmente en ingresos/ y gastos/
          existentes = set()
          for carpeta in ["ingresos", "gastos"]:
              d = BASE_DIR / "facturas" / carpeta
              if d.exists():
                  for p in d.iterdir():
                      if p.suffix.lower() in ('.pdf', '.jpg', '.jpeg', '.png', '.heic', '.webp'):
                          existentes.add(p.name)

          print(f"Archivos activos: {existentes}")

          with open(JSON_PATH, 'r', encoding='utf-8') as f:
              data = json.load(f)

          antes = len(data["facturas"])
          data["facturas"] = [f for f in data["facturas"]
                              if os.path.basename(f.get("archivo", "")) in existentes]
          despues = len(data["facturas"])

          if antes != despues:
              data["fecha_generacion"] = time.strftime("%Y-%m-%d")
              with open(JSON_PATH, 'w', encoding='utf-8') as f:
                  json.dump(data, f, ensure_ascii=False, indent=2)
              print(f"Eliminadas {antes - despues} facturas del dashboard")
          else:
              print("Sin cambios en el JSON")
          EOF

      - name: Subir cambios
        run: |
          git config user.name "Dashboard Bot"
          git config user.email "bot@dashboard-facturas"
          git add empresa-original-prueba-1/facturas_datos.json
          git diff --staged --quiet || git commit -m "Empresa 1: dashboard sincronizado [skip ci]"
          git pull --rebase origin main
          git push
