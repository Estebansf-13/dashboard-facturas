name: Archivar Factura — Carmen Fortes

on:
  push:
    paths:
      - 'empresa-2-carmen-fortes/facturas/archivadas/**'

jobs:
  archivar:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Eliminar facturas archivadas del dashboard
        run: |
          python3 - <<'EOF'
          import json, os, time
          from pathlib import Path

          BASE_DIR = Path("empresa-2-carmen-fortes")
          ARCHIVADAS_DIR = BASE_DIR / "facturas" / "archivadas"
          JSON_PATH = BASE_DIR / "facturas_datos.json"

          archivadas = {p.name for p in ARCHIVADAS_DIR.glob("*") if p.suffix.lower() in ('.pdf', '.jpg', '.jpeg', '.png', '.heic', '.webp')}
          print(f"Archivos en archivadas: {archivadas}")

          with open(JSON_PATH, 'r', encoding='utf-8') as f:
              data = json.load(f)

          antes = len(data["facturas"])
          data["facturas"] = [f for f in data["facturas"]
                              if os.path.basename(f.get("archivo", "")) not in archivadas]
          despues = len(data["facturas"])

          if antes != despues:
              data["fecha_generacion"] = time.strftime("%Y-%m-%d")
              with open(JSON_PATH, 'w', encoding='utf-8') as f:
                  json.dump(data, f, ensure_ascii=False, indent=2)
              print(f"Eliminadas {antes - despues} facturas del dashboard")
          else:
              print("Sin cambios en el JSON")
          EOF

      - name: Subir cambios
        run: |
          git config user.name "Dashboard Bot"
          git config user.email "bot@dashboard-facturas"
          git add empresa-2-carmen-fortes/facturas_datos.json empresa-2-carmen-fortes/facturas/
          git diff --staged --quiet || git commit -m "Carmen Fortes: factura archivada [skip ci]"
          git pull --rebase origin main
          git push
